# Stage 3: SMP model training
name: finetune
description: Train segmentation model (SMP) on prepared dataset

dataset_root: ${paths.root}/dataset/defect_data  ## no refinement
checkpoints_dir: ${paths.root}/checkpoints
resume: null

batch_size: 2
num_workers: 2
learning_rate: 0.0005
epochs: 200
weight_decay: 0.0002

optimizer_name: adamw
encoder_lr_scale: 0.05
scheduler_name: onecycle
warmup_pct: 0.1
grad_clip: 1.0

use_class_weights: true
use_focal_loss: true
use_dice_loss: true
ce_loss_weight: 0.75
focal_loss_weight: 1.0
dice_loss_weight: 1.5
focal_gamma: 2.0

# Log per-class validation metrics (IoU, Dice, precision, recall, F1) each epoch
per_class_metrics: true

# Model profile from configs/models/<name>.yaml
model_profile: deeplabv3plus_resnet50

use_wandb: true
wandb_project: defect-segmentation-hpc
wandb_run_name: deeplabv3plus-resnet50_merge_fix_binary_mode_es8_tuned

use_early_stopping: true
early_stop_patience: 25
early_stop_min_delta: 0.001
early_stop_metric: val_dice

augmentations_enabled: true
aug_hflip_prob: 0.5
aug_vflip_prob: 0.5
aug_rotate90_prob: 0.0
aug_brightness: 0.15
aug_contrast: 0.15
aug_noise_std: 0.0
aug_brightness_contrast_prob: 0.3
aug_shift_scale_rotate_prob: 0.3
aug_shift_limit: 0.05
aug_scale_limit: 0.1
aug_rotate_limit: 15.0
aug_clahe_prob: 0.0
aug_clahe_clip: 2.0
aug_gauss_noise_prob: 0.1
aug_gaussian_blur_prob: 0.0
aug_gaussian_blur_kernel: 3
aug_random_crop_defect_prob: 0.8
aug_random_crop_defect_size: 256

image_size: 512
num_classes: 2
limit_background_samples: true
max_background_to_foreground_ratio: 0.25
